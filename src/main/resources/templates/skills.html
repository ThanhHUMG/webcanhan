<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <title>Kỹ năng</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body>
    <!-- HEADER (giống index) -->
    <div class="header">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-3 text-center text-md-start">
            <img th:src="@{/images/avatar.jpg}" class="avatar" />
          </div>

          <div class="col-md-9">
            <h4 th:text="${name} + ' - ' + ${age} + ' tuổi'"></h4>
            <p>🎓 <span th:text="${school}"></span></p>
            <p>
              📧 <span th:text="${email}"></span> | 📞
              <span th:text="${phone}"></span>
            </p>
            <p>📍 <span th:text="${address}"></span></p>
            <p>
              📘
              <a
                th:href="${facebook}"
                target="_blank"
                class="text-white text-decoration-none"
              >
                Facebook
              </a>
              | 💬
              <a
                th:href="${zalo}"
                target="_blank"
                class="text-white text-decoration-none"
              >
                Zalo
              </a>
            </p>
            <div class="mt-2">
              <a href="/" class="nav-btn">Trang chủ</a>
              <a href="/skills" class="nav-btn">Kỹ năng</a>
              <a href="/projects" class="nav-btn">Dự án</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="container mt-5">
      <h3 class="text-center mb-4">Kỹ năng chuyên môn</h3>

      <div class="row">
        <div class="col-md-4">
          <div class="card p-3 text-center">
            <h5>Java</h5>
            <p>Spring Boot, MVC, REST API</p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3 text-center">
            <h5>Web</h5>
            <p>HTML, CSS, Bootstrap</p>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card p-3 text-center">
            <h5>Database</h5>
            <p>MySQL, Firebase</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
